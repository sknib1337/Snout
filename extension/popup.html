<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="bar">
    <div class="brand">
      <svg class="mark" width="26" height="26" viewBox="0 0 96 96" aria-hidden="true"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#adc6ff"/><stop offset="1" stop-color="#4edea3"/></linearGradient></defs><path fill="url(#g)" fill-rule="evenodd" d="M38,20 L58,20 Q67,20 71.93,27.52 L81.07,41.48 Q86,49 81.07,56.52 L71.93,70.48 Q67,78 58,78 L38,78 Q29,78 24.07,70.48 L14.93,56.52 Q10,49 14.93,41.48 L24.07,27.52 Q29,20 38,20 Z M31.63,51.25 a6,10.5 12 1,0 11.74,2.50 a6,10.5 12 1,0 -11.74,-2.50 Z M52.63,53.75 a6,10.5 -12 1,0 11.74,-2.50 a6,10.5 -12 1,0 -11.74,2.50 Z"/></svg>
      <div>
        <div class="title">Snout — shadow SaaS &amp; auth</div>
        <div class="sub" id="sub">scanning…</div>
      </div>
    </div>
    <button id="pause" class="ghost" title="Pause / resume capture">⏸</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="num" id="s-apps">0</div><div class="lbl">Apps</div></div>
    <div class="stat"><div class="num red" id="s-shadow">0</div><div class="lbl">Shadow</div></div>
    <div class="stat"><div class="num blue" id="s-oauth">0</div><div class="lbl">OAuth grants</div></div>
  </div>

  <div class="filters">
    <button class="chip active" data-f="all">All</button>
    <button class="chip" data-f="shadow">Shadow only</button>
    <button class="chip" data-f="oauth">OAuth grants</button>
  </div>

  <div id="list" class="list"></div>
  <div id="empty" class="empty" hidden>No apps captured yet. Log into a SaaS tool and it will appear here.</div>

  <div class="foot">
    <button id="export" class="ghost">Export JSON</button>
    <button id="sync" class="ghost">Sync</button>
    <button id="options" class="ghost">Options</button>
    <button id="clear" class="ghost danger">Clear</button>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
