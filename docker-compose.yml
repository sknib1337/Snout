services:
  server:
    build: ./server
    # All vars from server/.env are passed through — including LLM_PROVIDER,
    # ANTHROPIC_BASE_URL, and the LLM_* / ANTHROPIC_* provider settings.
    env_file: ./server/.env
    environment:
      - WEB_ORIGIN=http://localhost:8080
      - APP_BASE_URL=http://localhost:8080
      - DATA_DIR=/data
    volumes:
      - trust-data:/data
    ports:
      - "8787:8787"

  web:
    build: ./web
    depends_on:
      - server
    ports:
      - "8080:80"

volumes:
  trust-data:
